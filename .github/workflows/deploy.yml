name: Build & Deploy

on:
  # Deploy is a DELIBERATE action, not automatic on every merge. Previously this
  # fired on every push to main, so merging a PR silently shipped to prod —
  # which conflicts with the "never deploy without explicit instruction" and
  # "auth changes need approval before deploy" rules. Now it runs only when
  # triggered by hand (Actions -> Build & Deploy -> Run workflow) or by pushing
  # a release tag. Merging to main no longer deploys.
  workflow_dispatch:
  push:
    tags: ['release/v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            --dart-define=POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}" \
            --dart-define=POSTHOG_HOST="${{ secrets.POSTHOG_HOST }}"

      - name: Deploy to Netlify
        run: |
          cd build/web
          zip -r /tmp/deploy.zip .
          result=$(curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @/tmp/deploy.zip)
          echo "State: $(echo $result | jq -r '.state')"
          echo "URL:   $(echo $result | jq -r '.ssl_url')"
          if [ "$(echo $result | jq -r '.state')" = "null" ]; then
            echo "Deploy failed: $result"
            exit 1
          fi
