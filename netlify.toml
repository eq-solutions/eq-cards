[build]
  # Builds are handled by GitHub Actions (deploy.yml) via zip-upload API.
  # Netlify's ignore convention: exit 0 = build, non-zero = skip.
  # "exit 1" here means: always skip git-triggered Netlify builds.
  command   = "echo 'Deployed via GitHub Actions — not built by Netlify directly.'"
  publish   = "build/web"
  ignore    = "exit 1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
