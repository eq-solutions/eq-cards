# Netlify config for eq-cards.netlify.app.
# Deploys are manual only - use deploy.ps1 or netlify deploy --prod --dir=build/web
# Site ID: c1bf4b4d-3131-4dd6-977f-2c0dd5cc4d72

[build]
  publish = "build/web"
  ignore = "exit 0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200