# Netlify config for eq-cards.netlify.app.
#
# Deploys are manual zip-drop OR `netlify deploy --prod` from a local build.
# There is no GitHub auto-deploy wired up — production releases are gated
# by an explicit step (per global EQ rules: "Never deploy without explicit
# instruction").
#
# Site ID: c1bf4b4d-3131-4dd6-977f-2c0dd5cc4d72

[build]
  publish = "build/web"
  # No build command — deploy with pre-built assets: flutter build web && netlify deploy --prod --dir=build/web

# SPA routing — all paths serve index.html so go_router handles the route
# (required for /share?licence_id=... deep links to work on direct access).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://jvknxcmbtrfnxfrwfimn.supabase.co; connect-src 'self' blob: https://jvknxcmbtrfnxfrwfimn.supabase.co https://*.supabase.co wss://jvknxcmbtrfnxfrwfimn.supabase.co https://eu.i.posthog.com https://eu-assets.i.posthog.com https://*.sentry.io; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'self' https://*.eq.solutions; base-uri 'self'; form-action 'self'"
