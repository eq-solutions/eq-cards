[build]
  # Builds are handled by GitHub Actions (deploy.yml) via zip-upload API.
  # Netlify ignore convention: exit 0 = SKIP build, non-zero = proceed.
  # "exit 0" here means: always skip git-triggered Netlify builds.
  # Primary guard: stop_builds=true in Netlify site settings.
  command   = "echo 'Deployed via GitHub Actions — not built by Netlify directly.'"
  publish   = "build/web"
  ignore    = "exit 0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Smart front door: the bare root serves the static marketing page
# (web/welcome.html), NOT the Flutter app. welcome.html detects an existing
# EQ session client-side and bounces returning/core users straight to /splash,
# so only cold visitors actually see the marketing pitch. This exact-match
# rule must sit ABOVE the SPA catch-all (first match wins). Every other route
# (/splash, /email, /claim, /join, /licences, …) still falls through to the
# Flutter app, so deep links and the existing pilot are unaffected.
[[redirects]]
  from   = "/"
  to     = "/welcome.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Flutter web cache headers.
# flutter_service_worker.js and index.html must never be cached (they carry
# the version hash that triggers app updates). main.dart.js CAN be cached but
# must not be immutable — the file name doesn't change between deploys so the
# browser needs to re-validate it.
[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# welcome.html carries the session-detect/redirect logic — must always be
# revalidated so the front-door behaviour can't be pinned by a stale cache.
[[headers]]
  for = "/welcome.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/main.dart.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/main.dart.wasm"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"
