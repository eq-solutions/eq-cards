name: eq_cards
description: EQ Cards — wallet for tradies. Tap-to-copy profile and licence fields.
publish_to: 'none'
version: 0.1.0+1

environment:
  # Floors raised by the riverpod 3 / go_router 17 upgrade: riverpod 3
  # requires Dart >=3.8, go_router 17 requires Flutter >=3.32.
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # Design tokens — canonical EQ colours, spacing, radius, typography.
  # pubspec.yaml was added to eq-design-tokens in v1.3.2; this replaces the
  # manual vendor copy at lib/core/theme/eq_tokens.dart (kept for now as
  # the delegating shim — retire once all callsites import from this package).
  eq_design_tokens:
    git:
      url: https://github.com/eq-solutions/eq-design-tokens
      ref: v1.3.2

  # State (architecture §1)
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Models (architecture §5)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Routing (architecture §6)
  go_router: ^17.0.0

  # Backend (architecture §4)
  supabase_flutter: ^2.5.0
  dio: ^5.4.0
  http: ^1.2.0

  # Local storage (architecture §11.1). Supabase persists its auth session via
  # shared_preferences; flutter_secure_storage was unused (removed 2026-05-30).
  shared_preferences: ^2.2.0

  # Photos (architecture §11.2). image_picker handles both camera (mobile) and
  # file dialog (web). image_cropper re-added 2026-04-29 — lets the user
  # frame the licence card before OCR (better extraction quality + smaller
  # uploads).
  image_picker: ^1.1.0
  image_cropper: ^12.0.0
  flutter_image_compress: ^2.3.0

  # Web-only: canvas.toBlob() replacement for flutter_image_compress_web's
  # synchronous canvas.toDataURL() call, which blocks the main thread long
  # enough to freeze the OCR loading spinner mid-scan (architecture §11.2).
  web: ^1.1.0

  # OCR — on-device (architecture §16 Q3 starting position)
  google_mlkit_text_recognition: ^0.15.0

  # QR generation (Phase 1)
  qr_flutter: ^4.1.0

  # Local notifications for licence-expiry alerts (architecture §16). No remote
  # push yet — firebase_core/firebase_messaging removed 2026-05-30 as unused.
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Analytics + crash
  posthog_flutter: ^5.0.0
  sentry_flutter: ^9.0.0

  # Biometric (architecture §11.4)
  local_auth: ^3.0.0

  # Image decoding / cropping — pure Dart, used by LicenceCropScreen to
  # decode the captured photo, apply the user's crop rect, and re-encode
  # as JPEG before the OCR upload. No JS bridge, works on all platforms.
  image: ^4.2.0

  # UUID generation — client-side IDs for certificate storage paths
  # before the DB row is inserted.
  uuid: ^4.4.0

  # File picking — PDF + image selection for certificates.
  # file_picker handles <input type="file"> on web and native pickers on mobile.
  file_picker: ^11.0.0

  # Open signed URLs (PDFs) in the device browser / PDF viewer.
  url_launcher: ^6.3.0

  # Date formatting
  intl: ^0.20.0

  # Annotations (`@visibleForTesting` etc.) — used by repository helpers
  meta: ^1.10.0

  # Markdown rendering for in-app Privacy Policy + Terms screens.
  # flutter_markdown was discontinued; flutter_markdown_plus is the
  # community-maintained successor with the same API surface.
  flutter_markdown_plus: ^1.0.0

  # Part of the Flutter SDK (not pub.dev) — provides usePathUrlStrategy() for
  # clean web URLs in main.dart. Declared explicitly 2026-05-30 to satisfy
  # depend_on_referenced_packages.
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint (architecture §1)
  very_good_analysis: ^10.0.0

  # Codegen (architecture §1). riverpod_generator 3 brings the build v4
  # transition, which also unblocks json_serializable to float to its
  # latest 6.x (it was previously capped by riverpod_generator 2's build ^2).
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Launcher icon generation. Source PNG lives at assets/icon/launcher.png
  # (1024x1024). Run `dart run flutter_launcher_icons` after replacing the
  # source to regenerate iOS .iconset and Android mipmap-* PNGs. Default
  # direction is Linear ("EQ" wordmark on sky) — see STATUS.md for the
  # design-decision context.
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  # Bundled assets — launcher source PNGs are consumed by
  # flutter_launcher_icons at icon-generation time. The in-app preview in
  # lib/core/design/app_icon_preview.dart also loads launcher.png via
  # Image.asset for the Linear variant. Legal markdown is loaded by
  # `LegalDocumentScreen` via rootBundle.
  assets:
    - assets/icon/launcher.png
    - assets/icon/launcher_foreground.png
    - assets/legal/privacy-policy.md
    - assets/legal/terms-of-use.md

  # Plus Jakarta Sans — architecture §7.3.
  # Using the single variable font from Google's official repo. Flutter
  # selects the right weight from the variable axis at runtime, so we
  # don't need separate Regular/Medium/SemiBold/Bold .ttf files.
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
