<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your EQ Cards sign-in code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1A1A2E;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      color: #1A1A2E;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Outer wrapper ── */
    .outer { padding: 32px 16px 48px; }
    .card {
      max-width: 440px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #2E2E46;
    }

    /* ── Hero — dark ink, mirrors shell left panel ── */
    .hero {
      background: #1A1A2E;
      padding: 44px 36px 40px;
      border-bottom: 1px solid #2E2E46;
      text-align: center;
    }
    .hero-logo {
      display: block;
      height: 72px;
      width: auto;
      margin: 0 auto 28px;
      /* Makes the blue SVG white on dark bg.
         Gmail ✓  Apple Mail ✓  iOS ✓  Outlook.com ✓
         Outlook 2019 desktop: shows blue on dark (still legible) */
      filter: brightness(0) invert(1);
    }
    .hero-app {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3DA8D8;
      margin-bottom: 10px;
    }
    .hero-heading {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #FFFFFF;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
    }

    /* ── Body — warm sand ── */
    .body {
      background: #F6F3EE;
      padding: 28px 32px 24px;
    }

    /* Code tile */
    .code-tile {
      background: #FFFFFF;
      border: 1px solid #D4CCBE;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 22px;
      text-align: center;
    }
    .code-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9CA3AF;
      margin-bottom: 10px;
    }
    .code-value {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #1A1A2E;
      line-height: 1;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }
    .code-pill {
      display: inline-block;
      background: #EAF5FB;
      color: #2986B4;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.02em;
    }

    /* Divider */
    .divider {
      text-align: center;
      margin: 0 0 18px;
      position: relative;
    }
    .divider::before {
      content: '';
      display: block;
      border-top: 1px solid #E4DDD2;
      position: absolute;
      top: 50%;
      left: 0; right: 0;
    }
    .divider span {
      display: inline-block;
      position: relative;
      background: #F6F3EE;
      padding: 0 12px;
      font-size: 11px;
      color: #9CA3AF;
      font-weight: 600;
    }

    /* CTA */
    .btn {
      display: block;
      background: #2986B4;
      color: #FFFFFF !important;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      padding: 15px 24px;
      border-radius: 13px;
      text-align: center;
      letter-spacing: -0.1px;
      margin-bottom: 22px;
    }

    /* Notice */
    .notice {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.6;
      text-align: center;
    }

    /* ── Footer ── */
    .footer {
      background: #EFEAE1;
      border-top: 1px solid #D4CCBE;
      padding: 16px 32px;
      text-align: center;
      font-size: 11px;
      color: #9CA3AF;
      line-height: 1.7;
    }
    .footer a { color: #3DA8D8; text-decoration: none; }
    .footer strong { color: #6B7280; }
  </style>
</head>
<body>
  <div class="outer">
    <div class="card">

      <!-- Dark ink hero — mirrors EQ Shell left panel -->
      <div class="hero">
        <img class="hero-logo"
             src="https://pub-409bd651f2e549f4907f5a856a9264ae.r2.dev/EQ_logo_blue_transparent.svg"
             alt="EQ" />
        <div class="hero-app">EQ Cards</div>
        <div class="hero-heading">Your sign-in<br />code is ready.</div>
        <div class="hero-sub">Expires in 10 minutes — do not share.</div>
      </div>

      <!-- Warm sand body -->
      <div class="body">

        <div class="code-tile">
          <div class="code-label">One-time code</div>
          <div class="code-value">{{ .Token }}</div>
          <span class="code-pill">Expires in 10 min</span>
        </div>

        <div class="divider"><span>or open a sign-in link</span></div>

        <a href="{{ .ConfirmationURL }}" class="btn">Sign in to EQ Cards →</a>

        <p class="notice">
          Didn't request this? Ignore it — your account is safe.
        </p>

      </div>

      <div class="footer">
        <strong>EQ Solutions</strong> &mdash;
        <a href="https://cards.eq.solutions">cards.eq.solutions</a><br />
        Automated message. Do not reply.
      </div>

    </div>
  </div>
</body>
</html>
