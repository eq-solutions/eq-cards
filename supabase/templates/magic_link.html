<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your EQ sign-in code</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: 'Plus Jakarta Sans', Arial, sans-serif;
      color: #1A1A2E;
    }
    .wrapper {
      max-width: 480px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      background-color: #3DA8D8;
      padding: 24px 32px;
    }
    .header-wordmark {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .body {
      padding: 32px;
    }
    .body p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.6;
      color: #1A1A2E;
    }
    .code-block {
      background-color: #EAF5FB;
      border-radius: 6px;
      padding: 20px 24px;
      margin: 24px 0;
      text-align: center;
    }
    .code {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 8px;
      color: #2986B4;
    }
    .expiry {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
    }
    .footer {
      padding: 20px 32px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-wordmark">EQ Cards</div>
    </div>
    <div class="body">
      <p>Here's your sign-in code:</p>
      <div class="code-block">
        <div class="code">{{ .Token }}</div>
        <div class="expiry">Expires in 1 hour</div>
      </div>
      <p>Enter this code in the EQ Cards app to sign in. If you didn't request this, you can ignore this email.</p>
    </div>
    <div class="footer">
      EQ Solutions &mdash; cards.eq.solutions<br />
      This is an automated message. Do not reply.
    </div>
  </div>
</body>
</html>
