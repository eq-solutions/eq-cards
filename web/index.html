<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tap-to-copy wallet for tradies.">
  <meta name="theme-color" content="#3DA8D8">

  <!--
    Viewport tuning for iOS PWA installs:
    - viewport-fit=cover lets us paint into the notch/dynamic-island area
      and the home-indicator gutter (we still respect SafeArea for content).
    - maximum-scale=1, user-scalable=no prevents iOS from auto-zooming on
      input focus when the input font-size is < 16px (which it is at our
      base 15px html size). Trade-off: blocks pinch-zoom; standard for
      app-like PWAs.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="EQ Cards">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EQ Cards</title>
  <link rel="manifest" href="manifest.json">

  <!-- Cropper.js — required by image_cropper on web. Must load synchronously
       before flutter_bootstrap.js so Cropper is available when Flutter calls
       new Cropper(...). Bundled locally (web/cropper.min.*) — CDN approach
       was being blocked by ad/privacy tools causing "Cropper is not a constructor". -->
  <link rel="stylesheet" href="cropper.min.css">
  <script src="cropper.min.js"></script>
  <script>
    // Ensure Cropper is globally accessible. The UMD bundle should set
    // window.Cropper via the global-assignment branch, but in rare environments
    // (some browser extensions, strict CSP test harnesses) the binding can be
    // lost. This guard surfaces a clear diagnostic instead of the cryptic
    // "v.G.Cropper is not a constructor" minified error.
    if (typeof window.Cropper !== 'function') {
      console.error('[EQ Cards] Cropper.js did not expose window.Cropper ' +
        '(got ' + typeof window.Cropper + '). ' +
        'Licence photo cropping will be unavailable.');
    }
  </script>

  <!--
    One-time legacy SW purge.
    The pre-Unit-4 build registered Flutter's default SW, which kept serving
    the old email-OTP entry screen (and stale Supabase URL) even after the
    canonical flip. This block fires ONCE for existing users who had that
    broken SW installed: it unregisters it, clears its caches, and sets
    eq_sw_legacy_purged in localStorage so it never runs again. New users
    (no prior SW) skip it entirely via the localStorage guard. After the
    one-time purge the SW is free to register and stay registered — enabling
    offline wallet support.
  -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      if (localStorage.getItem('eq_sw_legacy_purged') === '1') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        Promise.all(regs.map(function (r) { return r.unregister(); }))
          .then(function () {
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            });
          })
          .then(function () { localStorage.setItem('eq_sw_legacy_purged', '1'); })
          .catch(function () { localStorage.setItem('eq_sw_legacy_purged', '1'); });
      });
    })();
  </script>

      api_host: 'https://eu.i.posthog.com',
      person_profiles: 'identified_only'

  <!-- EQ boot loader — bars spinner shown during Flutter engine init. Mirrors the
       @eq-solutions/ui <Spinner variant="bars">; brand colours are inlined because the
       Flutter boot shell has no design-token CSS. Removed on the first painted frame. -->
  <style>
    #eq-boot-loader { position: fixed; inset: 0; z-index: 2147483647; display: flex; align-items: center; justify-content: center; background: #ffffff; }
    #eq-boot-loader .eq-spinner { display: inline-flex; align-items: flex-end; gap: 4px; height: 40px; }
    #eq-boot-loader .eq-spinner span { width: 5px; height: 100%; border-radius: 9999px; background: #3DA8D8; transform-origin: bottom; animation: eq-boot-bars 0.9s ease-in-out infinite; }
    #eq-boot-loader .eq-spinner span:nth-child(2) { background: #2986B4; animation-delay: 0.18s; }
    #eq-boot-loader .eq-spinner span:nth-child(3) { animation-delay: 0.36s; }
    #eq-boot-loader .eq-spinner span:nth-child(4) { background: #2986B4; animation-delay: 0.135s; }
    #eq-boot-loader .eq-spinner span:nth-child(5) { animation-delay: 0.27s; }
    @keyframes eq-boot-bars { 0%, 100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
    @media (prefers-reduced-motion: reduce) { #eq-boot-loader .eq-spinner span { animation: none; transform: scaleY(1); } }
  </style>
</head>
<body>
  <div id="eq-boot-loader" role="status" aria-label="Loading">
    <span class="eq-spinner" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('eq-boot-loader');
      if (el && el.parentNode) el.parentNode.removeChild(el);
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
