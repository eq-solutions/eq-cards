<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3DA8D8">
  <meta name="description" content="EQ Cards — a free digital wallet for tradies. Keep your licences, tickets and certificates on you, and show them in a tap on any job.">
  <title>EQ Cards — your licences and tickets, always on you</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!--
    Smart front door. This static page is served at "/" (see netlify.toml).
    A returning EQ user — or a core user handed off from core.eq.solutions —
    already has a Supabase session persisted in this browser's localStorage.
    Detect it SYNCHRONOUSLY, before any marketing paints, and bounce them
    straight into the app at /splash (where GoRouter routes them to their
    wallet). Cold visitors with no session fall through and see the pitch.

    Detection is version-tolerant: supabase_flutter persists via
    shared_preferences (web → localStorage, often under a "flutter." prefix)
    and the key/encoding has shifted across package versions, so we scan all
    keys for an auth-token blob and check it hasn't expired rather than
    hardcoding one key. Expired/absent → stay on the marketing page.
  -->
  <script>
    (function () {
      // Any Supabase auth key = a prior session exists. Flutter handles expiry
      // and refresh — we just need to get returning users into the app, not
      // show them a marketing page every time their access token rotates.
      function hasSession() {
        try {
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && (/sb-.+-auth-token/i.test(k) || /auth.?token/i.test(k))) {
              var v = localStorage.getItem(k);
              if (v && v.length > 20) return true;
            }
          }
        } catch (e) {}
        return false;
      }
      if (hasSession()) { location.replace('/splash'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1A2E;
      background: #EAF5FB;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 480px; min-height: 100%; background: #FFFFFF; display: flex; flex-direction: column; }
    .hero { background: #EAF5FB; padding: 40px 28px 32px; }
    .brand { display: flex; align-items: center; gap: 9px; margin-bottom: 36px; }
    .brand-mark { width: 30px; height: 30px; background: #3DA8D8; border-radius: 8px; color: #FFFFFF;
      display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    .brand-name { font-weight: 700; font-size: 18px; }
    h1 { font-weight: 700; font-size: 28px; line-height: 1.22; letter-spacing: -0.01em; }
    .sub { font-size: 16px; line-height: 1.55; color: #46637A; margin-top: 14px; }
    .body { padding: 26px 28px 32px; display: flex; flex-direction: column; flex: 1; }
    .btn { width: 100%; font-family: inherit; font-size: 16px; padding: 16px; border-radius: 12px;
      cursor: pointer; text-align: center; text-decoration: none; display: block; border: none; }
    .btn-primary { background: #3DA8D8; color: #FFFFFF; font-weight: 700; }
    .muted { color: #46637A; font-size: 15px; }
    .footer { text-align: center; margin-top: 18px; font-size: 12px; color: #9AAAB7; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="brand">
        <span class="brand-mark">EQ</span>
        <span class="brand-name">EQ Cards</span>
      </div>
      <h1>Your tickets and licences, on your phone.</h1>
      <p class="sub">Free for tradies. Add them once, show them in a tap.</p>
    </section>

    <section class="body">
      <a class="btn btn-primary" href="/email">Get started</a>
      <p class="muted" style="text-align:center;margin-top:14px;font-size:14px;">Already have a wallet? We'll sign you straight in.</p>

      <div class="signin">
        <div class="footer" style="margin-top:auto;padding-top:26px;">Built by EQ Solutions</div>
      </div>
    </section>
  </main>
</body>
</html>
